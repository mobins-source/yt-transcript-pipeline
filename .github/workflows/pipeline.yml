name: YouTube Transcript Pipeline

# Runs on schedule — MCC Tucson channel ONLY.
# Sh. Ali Mashhour playlists (YOUTUBE_PLAYLISTS in local pipeline/.env) are
# deliberately NOT included here — backfill them manually on the Mac as time
# permits:  cd pipeline && python3 run.py --backfill --max 0
# (Backfill mode: 40-request budget, circuit breaker, gentle pacing.)
#
# Over 24 hours the schedule covers new MCC videos without triggering blocks.
# Already-fetched transcripts are always skipped automatically.
#
# IMPORTANT — RUNNER CHOICE:
#   This workflow uses a self-hosted runner on your Mac (home IP = better YouTube
#   reputation than GitHub's cloud datacenter IPs, which get blocked even with cookies).
#   The runner is installed as a background service — see GitHub repo →
#   Settings → Actions → Runners for status.
#
#   To temporarily fall back to GitHub-hosted cloud runner (e.g. Mac is offline):
#   change `runs-on: self-hosted` to `runs-on: ubuntu-latest` below.
#   Transcript fetching will likely get IP-blocked on new videos but existing
#   enrichment and index rebuilds will still work.
#
# COOKIE REFRESH (manual, every ~2 months):
#   When transcript fetching starts failing silently, your cookies have expired.
#   1. Export fresh cookies from a logged-in browser (EditThisCookie / cookie.txt exporter)
#   2. Repo → Settings → Secrets and variables → Actions → YOUTUBE_COOKIES → Update
#   3. Re-run the workflow manually to confirm it works again.

on:
  schedule:
    - cron: "17 15 * * *"   # 15:17 UTC = 08:17 MST daily (off the hour — top-of-hour cron slots get delayed/dropped under GitHub load)
    - cron: "17 5 * * *"    # 05:17 UTC = 22:17 MST daily
    - cron: "17 21 * * 5"   # 21:17 UTC = 14:17 MST Friday (initial run after Jumaa khutba)
    - cron: "17 1 * * 6"    # 01:17 UTC Saturday = 18:17 MST Friday (retry — gives YouTube ~2hrs to generate captions)

  workflow_dispatch:
    inputs:
      channel:
        description: "Channel handle (leave empty to use YOUTUBE_CHANNELS secret)"
        required: false
        default: ""
      max_videos:
        description: "Max videos per channel (0 = use MAX_VIDEOS_PER_CHANNEL)"
        required: false
        default: "20"
      batch_size:
        description: "Videos per batch"
        required: false
        default: "10"
      batch_pause:
        description: "Seconds to pause between batches"
        required: false
        default: "180"
      force:
        description: "Force re-enrich and re-generate SRTs"
        required: false
        default: "false"
        type: boolean

jobs:
  run-pipeline:
    # Pinned to the Mac by label — a Windows runner is being added for migration
    # (see pipeline-windows.yml). Without this pin, plain `self-hosted` would
    # match ANY registered runner and jobs could land on Windows and crash.
    runs-on: [self-hosted, macOS]
    timeout-minutes: 90   # 2 batches × (10 videos × 5s + 3min pause) ≈ 7min + enrichment
    defaults:
      run:
        shell: arch -arm64 /bin/bash -e {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: pip3 install -r pipeline/requirements.txt --break-system-packages

      - name: Write YouTube cookies
        run: |
          mkdir -p data
          printf '%s' "$YOUTUBE_COOKIES" > data/cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Create .env from secrets
        working-directory: pipeline
        run: |
          cat > .env <<EOF
          YOUTUBE_CHANNELS=${{ secrets.YOUTUBE_CHANNELS }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TRANSCRIPT_LANG=${{ vars.TRANSCRIPT_LANG || 'en' }}
          MAX_VIDEOS_PER_CHANNEL=${{ github.event.inputs.max_videos || '20' }}
          BATCH_SIZE=${{ github.event.inputs.batch_size || '10' }}
          BATCH_PAUSE=${{ github.event.inputs.batch_pause || '180' }}
          DATA_DIR=../data
          COOKIES_FILE=../data/cookies.txt
          EOF

      - name: Run pipeline
        working-directory: pipeline
        run: |
          CHANNEL_FLAG=""
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            CHANNEL_FLAG="--channel ${{ github.event.inputs.channel }}"
          fi

          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          python3 run.py \
            $CHANNEL_FLAG \
            --max ${{ github.event.inputs.max_videos || '20' }} \
            --batch-size ${{ github.event.inputs.batch_size || '10' }} \
            --batch-pause ${{ github.event.inputs.batch_pause || '180' }} \
            $FORCE_FLAG

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/transcripts data/metadata
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: pipeline run $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload data artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pipeline-data-${{ github.run_number }}
          path: data/
          retention-days: 7
