name: Playlist Backfill (Windows)

# ROLE: Sh. Ali Mashhour playlist backfill from a SEPARATE network/IP.
# The Mac runner owns the MCC schedule; this runner drains the playlist
# backlog without touching the Mac's YouTube request budget.
#
# Key differences from the Mac workflow:
#   - Playlists ONLY (no YOUTUBE_CHANNELS) — never fetches MCC
#   - --backfill mode: 40-request budget, circuit breaker, gentle pacing,
#     blocked videos stay pending
#   - NO COOKIES on purpose. The Windows machine is on a different IP with
#     no block history; anonymous fetching should work. NEVER point this
#     workflow at the YOUTUBE_COOKIES secret — the same session cookies on
#     two IPs concurrently can get the session invalidated for BOTH machines.
#     If blocks appear here, create a separate secret (YOUTUBE_COOKIES_WIN)
#     from a DIFFERENT Google account logged in on the Windows machine.
#   - Commits ONLY its own channel's files (transcripts + metadata +
#     index-<channel>.json) — never the combined index.json, never MCC
#     folders — so pushes can't conflict with the Mac runner's commits.
#   - workflow_dispatch only. Trigger manually as time permits.
#
# Windows runner setup: service install in C:\actions-runner (NOT under
# Documents/OneDrive), Python 3.11+ on PATH, Git for Windows (Git Bash),
# power set to never sleep, Update Active Hours configured.

on:
  workflow_dispatch:
    inputs:
      max_videos:
        description: "Max videos per playlist listing (0 = all). Backfill budget still caps fetches at 40/run."
        required: false
        default: "0"

env:
  # Sh. Ali Mashhour's channel (The Mosque Foundation) — the only channel
  # this workflow is allowed to commit.
  BACKFILL_CHANNEL_ID: UCXQm5nWl_fhxQwgHnRsPZPg

jobs:
  backfill:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120   # backfill pacing is slower by design (300s batch pauses)
    defaults:
      run:
        shell: bash   # Git Bash
    env:
      PYTHONUTF8: "1" # Windows consoles default to cp1252 — protects Arabic text

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: python -m pip install -r pipeline/requirements.txt

      - name: Create .env from secrets (playlists only, no channels, no cookies)
        working-directory: pipeline
        run: |
          cat > .env <<EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_PLAYLISTS=${{ secrets.YOUTUBE_PLAYLISTS }}
          TRANSCRIPT_LANG=en
          MAX_VIDEOS_PER_CHANNEL=${{ github.event.inputs.max_videos || '0' }}
          DATA_DIR=../data
          EOF

      - name: Run backfill
        working-directory: pipeline
        run: python run.py --backfill --max ${{ github.event.inputs.max_videos || '0' }}

      - name: Commit this channel's data only
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage ONLY this channel's files — transcripts, channel metadata,
          # and its per-channel index. Never combined index.json / MCC files.
          git add "data/transcripts/$BACKFILL_CHANNEL_ID" \
                  "data/metadata/$BACKFILL_CHANNEL_ID" \
                  "data/metadata/index-$BACKFILL_CHANNEL_ID.json"

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: playlist backfill (windows) $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"

          # Discard the combined index.json rebuild + any other tracked
          # modifications so the rebase below starts from a clean tree.
          git checkout -- .

          # The Mac runner pushes independently — rebase before pushing.
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload data artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backfill-windows-${{ github.run_number }}
          path: data/
          retention-days: 7
