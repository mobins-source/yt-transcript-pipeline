name: YouTube Transcript Pipeline (Windows)

# MIGRATION WORKFLOW — Windows 11 runner validation.
#
# Phase 2-3 of the Mac -> Windows migration:
#   - This file is workflow_dispatch ONLY (no schedule). The Mac workflow
#     (pipeline.yml) still owns the schedule during validation.
#   - Trigger this manually from the Actions tab, midday (away from the
#     8:17am / 10:17pm scheduled runs — both machines share one home IP,
#     so they share one YouTube request budget).
#   - Never run this while a Mac run is in progress (both push to main).
#
# CUTOVER (Phase 4): once several manual runs succeed over ~a week,
#   move the schedule: block from pipeline.yml into this file, leaving
#   the Mac workflow as workflow_dispatch-only fallback.
#
# Windows runner setup expectations:
#   - Runner installed as a Windows service in C:\actions-runner
#     (NOT inside the repo folder), labels: [self-hosted, Windows]
#   - Python 3.11+ on PATH (python.org installer, "Add to PATH" checked)
#   - Git for Windows installed (provides Git Bash for `shell: bash` below)
#   - Power settings: never sleep on AC; Windows Update Active Hours set
#     so auto-reboots avoid run windows.
#
# PYTHONUTF8=1 forces UTF-8 for all Python I/O — Windows consoles default
# to cp1252, which would mangle the Arabic text in transcripts and SRTs.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel handle (leave empty to use YOUTUBE_CHANNELS secret)"
        required: false
        default: ""
      max_videos:
        description: "Max videos per channel (0 = use MAX_VIDEOS_PER_CHANNEL). Keep small (2-5) for validation runs."
        required: false
        default: "5"
      batch_size:
        description: "Videos per batch"
        required: false
        default: "10"
      batch_pause:
        description: "Seconds to pause between batches"
        required: false
        default: "180"
      force:
        description: "Force re-enrich and re-generate SRTs"
        required: false
        default: "false"
        type: boolean

jobs:
  run-pipeline:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 90
    defaults:
      run:
        shell: bash   # Git Bash — heredocs, printf, and git steps work as on Mac
    env:
      PYTHONUTF8: "1" # protect Arabic text from cp1252 mangling

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: python -m pip install -r pipeline/requirements.txt

      - name: Write YouTube cookies
        run: |
          mkdir -p data
          printf '%s' "$YOUTUBE_COOKIES" > data/cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Create .env from secrets
        working-directory: pipeline
        run: |
          cat > .env <<EOF
          YOUTUBE_CHANNELS=${{ secrets.YOUTUBE_CHANNELS }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TRANSCRIPT_LANG=${{ vars.TRANSCRIPT_LANG || 'en' }}
          MAX_VIDEOS_PER_CHANNEL=${{ github.event.inputs.max_videos || '5' }}
          BATCH_SIZE=${{ github.event.inputs.batch_size || '10' }}
          BATCH_PAUSE=${{ github.event.inputs.batch_pause || '180' }}
          DATA_DIR=../data
          COOKIES_FILE=../data/cookies.txt
          EOF

      - name: Run pipeline
        working-directory: pipeline
        run: |
          CHANNEL_FLAG=""
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            CHANNEL_FLAG="--channel ${{ github.event.inputs.channel }}"
          fi

          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          python run.py \
            $CHANNEL_FLAG \
            --max ${{ github.event.inputs.max_videos || '5' }} \
            --batch-size ${{ github.event.inputs.batch_size || '10' }} \
            --batch-pause ${{ github.event.inputs.batch_pause || '180' }} \
            $FORCE_FLAG

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/transcripts data/metadata
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: pipeline run (windows) $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload data artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pipeline-data-windows-${{ github.run_number }}
          path: data/
          retention-days: 7
